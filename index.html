    .step-sublabel { font-size: 12px; color: #aaa; margin-left: auto; }

      padding: 8px 16px;
      background: #f5f0ea;
      border: 2px solid #e0d8d0;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      color: #291D13;
      transition: all 0.14s ease;
      font-family: inherit;
      position: relative;
    }

      border: 2px solid #fff;

      font-weight: 700;
      margin-top: 4px;

      color: #16a34a;
    }

  const city = CITIES.find(c => c.email === email);

/* ================================================================
   PERSISTANCE — localStorage
   clé : "fasup_done_mail{id}_{email}"  →  "1" ou absent
   ================================================================ */
function doneKey(mailId, email) {
  return `fasup_done_mail${mailId}_${email}`;
}
function isDone(mailId, email) {
  return localStorage.getItem(doneKey(mailId, email)) === '1';
}
function setDone(mailId, email, val) {
  if (val) localStorage.setItem(doneKey(mailId, email), '1');

function makeDoneSpan(mail, prefix) {
  const doneCount = CITIES.filter(c => isDone(mail.id, c.email)).length;

  return txt
    ? `<span class="mail-progress" id="${prefix}-mail${mail.id}">✓ ${doneCount}/${CITIES.length} villes actualisées</span>`
    : `<span class="mail-progress" id="${prefix}-mail${mail.id}" style="display:none"></span>`;

function createMailBtn(mail, prefix) {

  btn.onclick = () => selectMail(mail);
  return btn;
}

    } else {
      el.style.display = 'none';
    }
  });

/* ── Copier vers le presse-papiers (avec fallback execCommand) ── */
function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text).catch(() => execCopy(text));
  }
  execCopy(text);
  return Promise.resolve();
}
function execCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}

}

function renderCurrentTab() {

    const pre = document.createElement('pre');
    pre.textContent = currentCode;
    body.innerHTML = '';
    body.appendChild(pre);

  } else if (currentTab === 'preview') {

    wrap.className = 'mail-preview-wrap';
    const iframe = document.createElement('iframe');
    iframe.className = 'mail-preview-frame';
    iframe.scrolling = 'no';
    const previewCode = currentCode.replace(/\{\{[^}]+\}\}/g, 'Alex');
    iframe.srcdoc = `<!DOCTYPE html><html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>body{margin:0;padding:24px;background:#f0ece6;}</style>
</head><body>${previewCode}</body></html>`;
    wrap.appendChild(iframe);
    body.appendChild(wrap);
    iframe.onload = () => {
      try {
        const h = iframe.contentDocument.body.scrollHeight;
        iframe.style.height = (h + 48) + 'px';
      } catch(e) {}
    };

  } else if (currentTab === 'mailto') {
    const data = extractMailtoData(currentCode);

        <div class="compose-titlebar">
          <span class="compose-dot" style="background:#ff5f56"></span>
          <span class="compose-dot" style="background:#ffbd2e"></span>
          <span class="compose-dot" style="background:#27c93f"></span>
          <span class="compose-title">Aperçu — message envoyé quand l'étudiant clique le bouton</span>
        </div>
        <div class="compose-field">
          <span class="compose-label">À :</span>
          <span class="compose-value">${escHtml(data.to)}</span>
        </div>
        <div class="compose-field">
          <span class="compose-label">Objet :</span>
          <span class="compose-value">${escHtml(data.subject)}</span>
        </div>`;
      const bodyDiv = document.createElement('div');
      bodyDiv.className = 'compose-body';
      bodyDiv.textContent = data.body;
      card.appendChild(bodyDiv);
      wrap.appendChild(card);
      body.appendChild(wrap);
    } else {
      // CTA = lien web → affiche l'URL
      const ctaMatch = currentCode.match(/<a\s+href="(https?:\/\/[^"]+)"[^>]*style="[^"]*background-color:#F59D00/);
      const wrap = document.createElement('div');
      wrap.className = 'compose-wrap';
      const card = document.createElement('div');
      card.className = 'compose-card';
      if (ctaMatch) {
        const url = ctaMatch[1];
        const btnTextMatch = currentCode.match(/background-color:#F59D00[^>]*>\s*([^<]+?)\s*<\/a>/);
        const btnText = btnTextMatch ? btnTextMatch[1].trim() : 'Lien';
        card.innerHTML = `
          <div class="compose-titlebar">
            <span class="compose-dot" style="background:#ff5f56"></span>
            <span class="compose-dot" style="background:#ffbd2e"></span>
            <span class="compose-dot" style="background:#27c93f"></span>
            <span class="compose-title">Le bouton ouvre une page web</span>
          </div>
          <div class="compose-field">
            <span class="compose-label">Bouton :</span>

          </div>

            <span class="compose-label">Lien :</span>
            <span class="compose-value" style="word-break:break-all; color:#F59D00; font-weight:600;">${escHtml(url)}</span>
          </div>`;
      } else {
        card.innerHTML = `<div class="placeholder"><div class="icon">🔍</div>Impossible de lire le lien</div>`;

      wrap.appendChild(card);

    }

}

function extractMailtoData(html) {
  const match = html.match(/href="(mailto:[^"]+)"/);
  if (!match) return null;
  const raw = match[1];
  const qIdx = raw.indexOf('?');
  const to = decodeURIComponent(raw.slice('mailto:'.length, qIdx === -1 ? undefined : qIdx));
  if (qIdx === -1) return { to, subject: '', body: '' };
  let subject = '', body = '';
  raw.slice(qIdx + 1).split('&').forEach(part => {
    const eq = part.indexOf('=');
    if (eq === -1) return;
    const k = decodeURIComponent(part.slice(0, eq));
    const v = decodeURIComponent(part.slice(eq + 1));
    if (k === 'subject') subject = v;
    if (k === 'body')    body    = v;
  });
  return { to, subject, body };
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function refreshActualiseBtn() {
  if (!selectedMail || !selectedCity) return;
  const done = isDone(selectedMail.id, selectedCity.email);
  const btn  = document.getElementById('actualise-btn');
  const box  = document.getElementById('check-box');
  const lbl  = document.getElementById('actualise-label');

  btn.disabled = false;

  if (done) {
    btn.classList.add('done');
    box.textContent = '✓';
    lbl.textContent = 'Actualisé sur HubSpot';
  } else {
    btn.classList.remove('done');
    box.textContent = '';
    lbl.textContent = 'Marquer comme actualisé';
  }
}

/* ── Copy ── */
function copyCode() {
  if (!currentCode) return;

    const btn = document.getElementById('copy-btn');

    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copier le code';
      btn.classList.remove('copied');
    }, 2500);
  });
}
